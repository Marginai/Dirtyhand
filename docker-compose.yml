services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://127.0.0.1"
      CHROMA_PERSIST_DIR: /data/chroma
    volumes:
      - chroma_data:/data/chroma
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
